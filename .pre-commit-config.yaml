repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--strict]
        pass_filenames: false
        entry: mypy src/
        additional_dependencies:
          - "pydantic>=2.7"
          - "pydantic-settings>=2.4"
          - "typer>=0.12"
          - "structlog>=24.1"
          - "pytest>=8.0"
          - "openai>=1.50"
