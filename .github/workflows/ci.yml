name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v2
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -v

      - name: Type check
        run: uv run mypy src/

      - name: Lint
        run: uv run ruff check src/
